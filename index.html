<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進出庫管理系統 v9 (POS回報升級版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-20 relative">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 relative z-10">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">📦 進出庫管理系統</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">操作人員</label>
                <select id="operator" class="w-full border p-2 rounded bg-white mt-1 focus:ring-2 focus:ring-blue-300">
                    <option value="">請選擇人員...</option>
                    <option value="ABV001地中海臺北光復">ABV001地中海臺北光復</option>
                    <option value="ABV002加勒比海臺北忠孝">ABV002加勒比海臺北忠孝</option>
                    <option value="ABV003閣樓府中">ABV003閣樓府中</option>
                    <option value="ABV004日式臺北中山">ABV004日式臺北中山</option>
                    <option value="ABV005美式臺北敦化">ABV005美式臺北敦化</option>
                    <option value="ABV006日式新竹關新">ABV006日式新竹關新</option>
                    <option value="ABV007地中海林口">ABV007地中海林口</option>
                    <option value="ABV008加勒比海新竹光明">ABV008加勒比海新竹光明</option>
                    <option value="ABV011地中海台中">ABV011地中海台中</option>
                    <option value="ABV012日式桃園龜山">ABV012日式桃園龜山</option>
                    <option value="ABV014韓式板橋2店">ABV014韓式板橋2店</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">作業類型</label>
                <select id="type" class="w-full border p-2 rounded bg-white mt-1 focus:ring-2 focus:ring-blue-300">
                    <option value="入庫">📥 入庫</option>
                    <option value="出庫">📤 出庫</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">原因</label>
                <select id="reason" class="w-full border p-2 rounded bg-white mt-1 focus:ring-2 focus:ring-blue-300"></select>
            </div>
        </div>

        <div class="bg-blue-50 p-4 rounded-lg border border-blue-200 mb-4">
            <h3 class="text-sm font-bold text-blue-800 mb-3">錄入品項</h3>
            <div id="reader" class="hidden mb-3 overflow-hidden rounded-lg bg-black"></div>
            
            <button id="scanBtn" onclick="toggleScanner()" disabled class="w-full mb-3 bg-gray-300 text-gray-500 py-2 rounded border font-medium shadow-sm transition cursor-not-allowed">
                ⏳ 資料庫連線中...
            </button>

            <div class="space-y-3">
                <div>
                    <label class="text-xs text-gray-500">選擇商品 (掃描後自動帶出)</label>
                    <select id="productSelect" onchange="syncIdFromSelect()" class="w-full border p-2 rounded bg-white mt-1 focus:ring-2 focus:ring-blue-300">
                        <option value="">-- 請選擇商品 --</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500">商品編號</label>
                        <input type="text" id="scanId" class="w-full border p-2 rounded font-mono bg-gray-50 text-gray-600" readonly placeholder="等待掃描或選取">
                    </div>
                    <div class="w-24">
                        <label class="text-xs text-gray-500">數量</label>
                        <input type="number" id="scanQty" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300" value="1" min="1">
                    </div>
                </div>

                <button onclick="addCurrentItem()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 shadow-md active:bg-blue-800 transition">
                    ＋ 新增至待提交清單
                </button>
            </div>
        </div>
        
        <div class="mt-4">
            <h3 class="font-bold text-gray-700 mb-2 flex justify-between">
                <span>本次待提交：</span>
                <span id="totalItems" class="text-blue-600">0 項</span>
            </h3>
            <ul id="itemList" class="divide-y divide-gray-200 border rounded bg-gray-50 max-h-40 overflow-y-auto">
                <li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>
            </ul>
        </div>

        <button onclick="submitData()" id="submitBtn" class="w-full mt-6 bg-green-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-green-700 disabled:bg-gray-400 transition active:bg-green-800">
            確認提交至雲端
        </button>

        <hr class="my-6 border-gray-200">
        <button onclick="openLoseModal()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-red-700 transition active:bg-red-800 flex justify-center items-center gap-2">
            🚨 店內POS查不到商品回報
        </button>
    </div>

    <div id="addProductModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 transform transition-all">
            <h3 class="text-xl font-bold text-blue-600 mb-2">✨ 發現新商品</h3>
            <p class="text-xs text-gray-500 mb-4">此條碼不在資料庫中，請先建立基本資料：</p>
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-bold text-gray-700">商品編號 (ID)</label>
                    <input type="text" id="newProdId" class="w-full border p-2 rounded bg-gray-100 font-mono text-gray-600" readonly>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-700">分類 (Category)</label>
                    <input type="text" id="newProdCategory" placeholder="例如：耗材、硬體" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-700">品名 (Name)</label>
                    <input type="text" id="newProdName" placeholder="輸入商品名稱" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-700">期初數量 (Initial Stock)</label>
                    <input type="number" id="newProdStock" value="0" min="0" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300">
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded font-bold hover:bg-gray-300 transition">取消</button>
                <button onclick="submitNewProduct()" id="saveNewProdBtn" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 shadow transition">儲存並建立</button>
            </div>
        </div>
    </div>

    <div id="loseModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 transform transition-all border-t-8 border-red-600">
            <h3 class="text-xl font-bold text-red-600 mb-2">🚨 POS 查無商品回報</h3>
            <p class="text-xs text-gray-500 mb-4">請填入 POS 機上刷不出來的商品條碼，我們將回報給後台處理。</p>
            
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-bold text-gray-700">商品條碼 (必填)</label>
                    <input type="text" id="loseBarcode" oninput="autoFillLoseName()" placeholder="請輸入條碼" class="w-full border p-2 rounded font-mono focus:ring-2 focus:ring-red-300">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-700">商品名稱 (若資料庫有紀錄會自動帶出)</label>
                    <input type="text" id="loseName" placeholder="未找到名稱請手動輸入" class="w-full border p-2 rounded focus:ring-2 focus:ring-red-300 bg-red-50">
                </div>
            </div>
            
            <div class="mt-6 flex gap-3">
                <button onclick="closeLoseModal()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded font-bold hover:bg-gray-300 transition">取消</button>
                <button onclick="submitLoseReport()" id="submitLoseBtn" class="flex-1 bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700 shadow transition">確認上傳回報</button>
            </div>
        </div>
    </div>

    <script>
        // 🔒 你的 Google Apps Script URL
        const API_URL = "https://script.google.com/macros/s/AKfycbz_9M9rlcqYuU-sECyEDmrB34VVbXnVW_IDAqYph6EiuG8cSWEo3iBXnb7t5hKzQ-66/exec";
        
        let cart = [];
        let productDatabase = [];
        let isScanning = false;
        let html5QrCode = null;

        const reasonOptions = {
            "入庫": ["採購", "歸還", "借入", "調整"],
            "出庫": ["售出", "借出", "歸還", "調整"]
        };
        const typeSelect = document.getElementById('type');
        const reasonSelect = document.getElementById('reason');

        function updateReasonOptions() {
            const currentType = typeSelect.value;
            reasonSelect.innerHTML = ''; 
            reasonOptions[currentType].forEach(reason => {
                let opt = document.createElement('option');
                opt.value = reason;
                opt.text = reason;
                reasonSelect.add(opt);
            });
        }
        typeSelect.addEventListener('change', updateReasonOptions);
        updateReasonOptions(); 

        async function fetchProducts() {
            const scanBtn = document.getElementById('scanBtn');
            try {
                const response = await fetch(API_URL);
                productDatabase = await response.json();
                renderProductSelect();
                
                scanBtn.disabled = false;
                scanBtn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
                scanBtn.classList.add('bg-blue-100', 'text-blue-700', 'border-blue-300', 'active:bg-blue-200');
                scanBtn.innerText = "📷 開啟相機掃碼";
            } catch (e) {
                scanBtn.innerText = "⚠️ 資料庫連線失敗";
                alert("⚠️ 無法連線至資料庫，請確認網路或 URL 設定。");
            }
        }
        fetchProducts(); 

        function renderProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">-- 請選擇商品 --</option>';
            productDatabase.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id;
                opt.text = `${p.name} (${p.id})`;
                select.add(opt);
            });
        }

        function findProductInDB(scannedId) {
            const target = String(scannedId).trim();
            return productDatabase.find(p => {
                const dbId = String(p.id).trim();
                if (dbId === target) return true; 
                if (dbId.toUpperCase() === target.toUpperCase()) return true; 
                if (dbId.replace(/^0+/, '') === target.replace(/^0+/, '')) return true; 
                return false;
            });
        }

        function playSuccessFeedback() {
            if (navigator.vibrate) navigator.vibrate(100);
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); 
            } catch (e) {}
        }

        async function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            const btn = document.getElementById('scanBtn');
            
            if (productDatabase.length === 0) {
                alert("⚠️ 尚未讀取到商品清單，請稍候。");
                return;
            }

            if (!isScanning) {
                readerDiv.classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                
                const scannerConfig = { 
                    fps: 30, 
                    qrbox: { width: 260, height: 100 }, 
                    aspectRatio: 1.0,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39
                    ]
                }; 

                const cameraConstraints = { facingMode: "environment" };

                try {
                    await html5QrCode.start(
                        cameraConstraints, 
                        scannerConfig,
                        (decodedText) => {
                            playSuccessFeedback();
                            toggleScanner(); 
                            
                            const scannedId = String(decodedText).trim();
                            document.getElementById('scanId').value = scannedId;
                            
                            const exists = findProductInDB(scannedId);
                            if (exists) {
                                document.getElementById('productSelect').value = exists.id;
                            } else {
                                document.getElementById('productSelect').value = "";
                                openAddModal(scannedId);
                            }
                        }
                    );
                    btn.innerText = "❌ 關閉相機";
                    isScanning = true;
                } catch (err) {
                    alert("無法啟動相機。請確認網址為 HTTPS、權限已開，且勿用 LINE 內建瀏覽器。");
                    readerDiv.classList.add('hidden');
                }
            } else {
                if(html5QrCode) {
                    await html5QrCode.stop();
                    html5QrCode = null;
                }
                readerDiv.classList.add('hidden');
                btn.innerText = "📷 開啟相機掃碼";
                isScanning = false;
            }
        }

        function openAddModal(scannedId) {
            document.getElementById('newProdId').value = scannedId;
            document.getElementById('newProdCategory').value = "";
            document.getElementById('newProdName').value = "";
            document.getElementById('newProdStock').value = "0";
            document.getElementById('addProductModal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('addProductModal').classList.add('hidden');
        }

        async function submitNewProduct() {
            const id = document.getElementById('newProdId').value;
            const category = document.getElementById('newProdCategory').value.trim();
            const name = document.getElementById('newProdName').value.trim();
            const initialStock = document.getElementById('newProdStock').value;

            if (!category || !name) return alert("請填寫分類與品名！");

            const btn = document.getElementById('saveNewProdBtn');
            btn.disabled = true;
            btn.innerText = "建立中...";

            const payload = {
                action: "addProduct",
                product: { id: id, category: category, name: name, initialStock: initialStock }
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("🎉 商品建檔成功！");
                closeAddModal();
                productDatabase.push({ id: String(id), category: category, name: name });
                renderProductSelect();
                document.getElementById('productSelect').value = id;
                document.getElementById('scanId').value = id;
            } catch (e) {
                alert("建立失敗，請檢查網路。");
            } finally {
                btn.disabled = false;
                btn.innerText = "儲存並建立";
            }
        }

        function syncIdFromSelect() {
            document.getElementById('scanId').value = document.getElementById('productSelect').value;
        }

        function addCurrentItem() {
            const id = String(document.getElementById('scanId').value).trim();
            const qty = parseInt(document.getElementById('scanQty').value);
            
            if (!id || isNaN(qty) || qty <= 0) return alert("請輸入正確的商品與數量！");

            let name = "未知商品";
            const exists = findProductInDB(id);
            
            if (exists) {
                name = exists.name;
            } else {
                if(confirm("此商品不在資料庫中，是否要建立新商品？")) {
                    openAddModal(id);
                }
                return;
            }

            let existingItem = cart.find(i => findProductInDB(i.id).id === exists.id);
            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({ id: exists.id, name: name, quantity: qty });
            }

            document.getElementById('scanId').value = "";
            document.getElementById('productSelect').value = "";
            document.getElementById('scanQty').value = "1";
            renderList();
        }

        function renderList() {
            const list = document.getElementById('itemList');
            document.getElementById('totalItems').innerText = `${cart.length} 項`;
            if (cart.length === 0) {
                list.innerHTML = `<li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>`;
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <li class="p-3 flex justify-between items-center text-sm transition hover:bg-gray-100">
                    <div>
                        <div class="font-bold text-gray-800">${item.name}</div>
                        <div class="text-gray-500 text-xs">${item.id}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded">x${item.quantity}</span>
                        <button onclick="cart.splice(${index}, 1); renderList();" class="text-red-400 p-1 font-bold text-lg active:text-red-600 hover:scale-110 transition">✕</button>
                    </div>
                </li>
            `).join('');
        }

        async function submitData() {
            const operator = document.getElementById('operator').value;
            const reason = document.getElementById('reason').value;
            
            if (!operator) return alert("請選擇操作人員！");
            if (cart.length === 0) return alert("待提交清單不能為空！");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "資料傳送中...";

            const payload = {
                action: "addTransaction", 
                orderId: "ORD-" + Date.now(),
                operator: operator,
                type: document.getElementById('type').value,
                reason: reason,
                items: cart
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("✅ 成功寫入雲端試算表！");
                cart = []; 
                renderList();
            } catch (e) {
                alert("❌ 傳送失敗，請確認網路連線是否正常。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交至雲端";
            }
        }

        // ==========================================
        // 🌟 POS 查無商品回報邏輯 (含即時比對功能)
        // ==========================================
        function openLoseModal() {
            const operator = document.getElementById('operator').value;
            if (!operator) {
                alert("⚠️ 請先在畫面上方選擇「操作人員」，才能進行回報作業！");
                return;
            }
            
            document.getElementById('loseBarcode').value = "";
            document.getElementById('loseName').value = "";
            document.getElementById('loseModal').classList.remove('hidden');
        }

        function closeLoseModal() {
            document.getElementById('loseModal').classList.add('hidden');
        }

        // 🌟 新增：監聽輸入框，自動查品名
        function autoFillLoseName() {
            const barcode = document.getElementById('loseBarcode').value.trim();
            const nameInput = document.getElementById('loseName');
            
            if (barcode === "") {
                nameInput.value = "";
                return;
            }

            // 呼叫已經寫好的無敵比對函數
            const exists = findProductInDB(barcode);
            if (exists) {
                // 如果在 Products 表裡有找到，直接填入品名
                nameInput.value = exists.name;
            }
        }

        async function submitLoseReport() {
            const operator = document.getElementById('operator').value;
            const barcode = document.getElementById('loseBarcode').value.trim();
            const name = document.getElementById('loseName').value.trim();

            if (!barcode) return alert("請務必輸入商品條碼！");

            const btn = document.getElementById('submitLoseBtn');
            btn.disabled = true;
            btn.innerText = "上傳中...";

            const payload = {
                action: "reportLose",
                operator: operator,
                barcode: barcode,
                productName: name || "未提供"
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                alert("✅ 回報成功！已將未刷過條碼上傳至雲端。");
                closeLoseModal();
            } catch (e) {
                alert("❌ 上傳失敗，請檢查網路連線。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認上傳回報";
            }
        }
    </script>
</body>
</html>
