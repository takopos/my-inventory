<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進出庫管理系統 v2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">📦 進出庫管理系統</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">操作人員</label>
                <select id="operator" class="w-full border p-2 rounded bg-white mt-1">
                    <option value="">請選擇人員...</option>
                    <option value="Robin">Robin</option>
                    <option value="William">William</option>
                    <option value="Web">Web</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">作業類型</label>
                <select id="type" class="w-full border p-2 rounded bg-white mt-1">
                    <option value="入庫">📥 入庫</option>
                    <option value="出庫">📤 出庫</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">原因</label>
                <input type="text" id="reason" placeholder="如：採購" class="w-full border p-2 rounded mt-1">
            </div>
        </div>

        <div class="bg-blue-50 p-4 rounded-lg border border-blue-200 mb-4">
            <h3 class="text-sm font-bold text-blue-800 mb-3">錄入品項</h3>
            
            <div id="reader" class="hidden mb-3 overflow-hidden rounded-lg"></div>
            <button id="scanBtn" onclick="toggleScanner()" class="w-full mb-3 bg-blue-100 text-blue-700 py-2 rounded border border-blue-300 font-medium">
                📷 開啟相機掃碼
            </button>

            <div class="space-y-3">
                <div>
                    <label class="text-xs text-gray-500">選擇商品 (或掃描自動帶出)</label>
                    <select id="productSelect" onchange="syncIdFromSelect()" class="w-full border p-2 rounded bg-white mt-1">
                        <option value="">-- 請選擇商品 --</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500">編號</label>
                        <input type="text" id="scanId" class="w-full border p-2 rounded font-mono bg-gray-50" readonly>
                    </div>
                    <div class="w-24">
                        <label class="text-xs text-gray-500">數量</label>
                        <input type="number" id="scanQty" class="w-full border p-2 rounded" value="1" min="1">
                    </div>
                </div>

                <button onclick="addCurrentItem()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 shadow-md">
                    ＋ 新增至待提交清單
                </button>
            </div>
        </div>
        
        <div class="mt-4">
            <h3 class="font-bold text-gray-700 mb-2 flex justify-between">
                <span>本次待提交：</span>
                <span id="totalItems" class="text-blue-600">0 項</span>
            </h3>
            <ul id="itemList" class="divide-y divide-gray-200 border rounded bg-gray-50 max-h-40 overflow-y-auto">
                <li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>
            </ul>
        </div>

        <button onclick="submitData()" id="submitBtn" class="w-full mt-6 bg-green-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-green-700 disabled:bg-gray-400 transition">
            確認提交至雲端
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz_9M9rlcqYuU-sECyEDmrB34VVbXnVW_IDAqYph6EiuG8cSWEo3iBXnb7t5hKzQ-66/exec"; // 👈 請換成你的 URL
        
        let cart = [];
        let productDatabase = [];
        let isScanning = false;
        let html5QrCode = null;

        // 1. 初始化：從試算表抓取商品清單並填入下拉選單
        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                productDatabase = await response.json();
                const select = document.getElementById('productSelect');
                productDatabase.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p.id;
                    opt.text = `${p.name} (${p.id})`;
                    select.add(opt);
                });
            } catch (e) {
                alert("無法同步商品清單，請確認網路與 URL。");
            }
        }
        fetchProducts();

        // 2. 相機掃描開關
        async function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            const btn = document.getElementById('scanBtn');
            
            if (!isScanning) {
                readerDiv.classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 },
                    (decodedText) => {
                        document.getElementById('scanId').value = decodedText;
                        document.getElementById('productSelect').value = decodedText; // 同步下拉選單
                        if(navigator.vibrate) navigator.vibrate(50);
                        toggleScanner(); // 掃描成功後自動關閉相機
                    }
                );
                btn.innerText = "❌ 關閉相機";
                isScanning = true;
            } else {
                if(html5QrCode) {
                    await html5QrCode.stop();
                    html5QrCode = null;
                }
                readerDiv.classList.add('hidden');
                btn.innerText = "📷 開啟相機掃碼";
                isScanning = false;
            }
        }

        // 3. 當下拉選單改變時，同步編號文字框
        function syncIdFromSelect() {
            const select = document.getElementById('productSelect');
            document.getElementById('scanId').value = select.value;
        }

        // 4. 新增品項到本次清單
        function addCurrentItem() {
            const id = document.getElementById('scanId').value;
            const qty = parseInt(document.getElementById('scanQty').value);
            const select = document.getElementById('productSelect');
            const name = select.options[select.selectedIndex].text.split(' (')[0];

            if (!id || isNaN(qty) || qty <= 0) return alert("請選擇商品並輸入正確數量");

            let existing = cart.find(i => i.id === id);
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({ id: id, name: name, quantity: qty });
            }

            // 重置錄入區
            document.getElementById('scanId').value = "";
            document.getElementById('productSelect').value = "";
            document.getElementById('scanQty').value = "1";
            renderList();
        }

        function renderList() {
            const list = document.getElementById('itemList');
            document.getElementById('totalItems').innerText = `${cart.length} 項`;
            if (cart.length === 0) {
                list.innerHTML = `<li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>`;
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <li class="p-3 flex justify-between items-center text-sm">
                    <div>
                        <div class="font-bold text-gray-800">${item.name}</div>
                        <div class="text-gray-500 text-xs">${item.id}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-blue-600">x${item.quantity}</span>
                        <button onclick="cart.splice(${index}, 1); renderList();" class="text-red-400 p-1 font-bold">✕</button>
                    </div>
                </li>
            `).join('');
        }

        // 5. 提交到雲端
        async function submitData() {
            const operator = document.getElementById('operator').value;
            if (!operator || cart.length === 0) return alert("請填寫操作人並加入品項");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            const payload = {
                orderId: "ORD-" + Date.now(),
                operator: operator,
                type: document.getElementById('type').value,
                reason: document.getElementById('reason').value || "未註明",
                items: cart
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });
                alert("提交成功！");
                cart = [];
                renderList();
            } catch (e) {
                alert("提交失敗，請檢查網路。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交至雲端";
            }
        }
    </script>
</body>
</html>
