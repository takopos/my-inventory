<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進出庫管理系統 v3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-600">📦 進出庫管理系統</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">操作人員</label>
                <select id="operator" class="w-full border p-2 rounded bg-white mt-1">
                    <option value="">請選擇人員...</option>
                    <option value="Robin">Robin</option>
                    <option value="William">William</option>
                    <option value="Web">Web</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">作業類型</label>
                <select id="type" class="w-full border p-2 rounded bg-white mt-1">
                    <option value="入庫">📥 入庫</option>
                    <option value="出庫">📤 出庫</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">原因</label>
                <select id="reason" class="w-full border p-2 rounded bg-white mt-1">
                    </select>
            </div>
        </div>

        <div class="bg-blue-50 p-4 rounded-lg border border-blue-200 mb-4">
            <h3 class="text-sm font-bold text-blue-800 mb-3">錄入品項</h3>
            
            <div id="reader" class="hidden mb-3 overflow-hidden rounded-lg bg-black"></div>
            <button id="scanBtn" onclick="toggleScanner()" class="w-full mb-3 bg-blue-100 text-blue-700 py-2 rounded border border-blue-300 font-medium shadow-sm active:bg-blue-200">
                📷 開啟相機掃碼
            </button>

            <div class="space-y-3">
                <div>
                    <label class="text-xs text-gray-500">選擇商品 (掃描後自動帶出)</label>
                    <select id="productSelect" onchange="syncIdFromSelect()" class="w-full border p-2 rounded bg-white mt-1">
                        <option value="">-- 請選擇商品 --</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500">商品編號</label>
                        <input type="text" id="scanId" class="w-full border p-2 rounded font-mono bg-gray-50 text-gray-600" readonly placeholder="等待掃描或選取">
                    </div>
                    <div class="w-24">
                        <label class="text-xs text-gray-500">數量</label>
                        <input type="number" id="scanQty" class="w-full border p-2 rounded" value="1" min="1">
                    </div>
                </div>

                <button onclick="addCurrentItem()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 shadow-md active:bg-blue-800">
                    ＋ 新增至待提交清單
                </button>
            </div>
        </div>
        
        <div class="mt-4">
            <h3 class="font-bold text-gray-700 mb-2 flex justify-between">
                <span>本次待提交：</span>
                <span id="totalItems" class="text-blue-600">0 項</span>
            </h3>
            <ul id="itemList" class="divide-y divide-gray-200 border rounded bg-gray-50 max-h-40 overflow-y-auto">
                <li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>
            </ul>
        </div>

        <button onclick="submitData()" id="submitBtn" class="w-full mt-6 bg-green-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-green-700 disabled:bg-gray-400 transition active:bg-green-800">
            確認提交至雲端
        </button>
    </div>

    <script>
        // ==========================================
        // 1. 系統設定區
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbz_9M9rlcqYuU-sECyEDmrB34VVbXnVW_IDAqYph6EiuG8cSWEo3iBXnb7t5hKzQ-66/exec"; // ⚠️ 請務必換成你的 Google Apps Script URL
        
        let cart = [];
        let productDatabase = [];
        let isScanning = false;
        let html5QrCode = null;

        // 定義作業類型連動的原因選項
        const reasonOptions = {
            "入庫": ["採購", "歸還", "借入", "調整"],
            "出庫": ["售出", "借出", "歸還", "調整"]
        };

        // ==========================================
        // 2. 介面初始化與連動邏輯
        // ==========================================
        
        // 監聽「作業類型」的變更，自動更新「原因」下拉選單
        const typeSelect = document.getElementById('type');
        const reasonSelect = document.getElementById('reason');

        function updateReasonOptions() {
            const currentType = typeSelect.value;
            reasonSelect.innerHTML = ''; // 清空選項
            reasonOptions[currentType].forEach(reason => {
                let opt = document.createElement('option');
                opt.value = reason;
                opt.text = reason;
                reasonSelect.add(opt);
            });
        }
        
        // 綁定事件並在網頁載入時執行一次初始化
        typeSelect.addEventListener('change', updateReasonOptions);
        updateReasonOptions(); 

        // 啟動時從 Google 試算表抓取商品清單
        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                productDatabase = await response.json();
                const select = document.getElementById('productSelect');
                productDatabase.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p.id;
                    opt.text = `${p.name} (${p.id})`;
                    select.add(opt);
                });
            } catch (e) {
                console.error("無法同步商品清單", e);
            }
        }
        fetchProducts();

        // ==========================================
        // 3. 掃描與提示音效功能
        // ==========================================

        // 播放「逼一聲」與手機震動
        function playSuccessFeedback() {
            // 觸發手機震動 (100毫秒)
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
            // 觸發逼一聲 (使用瀏覽器內建 Web Audio API，免載入音檔)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine'; // 聲音類型：正弦波
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // 頻率 880Hz
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // 音量 10%
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); // 發聲 0.1 秒後停止
            } catch (e) {
                console.log("此瀏覽器不支援音效回饋");
            }
        }

        // 開關相機掃描器 (加入優化參數)
        async function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            const btn = document.getElementById('scanBtn');
            
            if (!isScanning) {
                readerDiv.classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                
                // 掃描器優化設定
                const config = { 
                    fps: 20, // 提升掃描偵數，反應更快
                    qrbox: { width: 250, height: 150 }, // 針對一維條碼優化掃描框比例 (寬扁型)
                    aspectRatio: 1.0,
                    disableFlip: false
                };

                try {
                    await html5QrCode.start(
                        { facingMode: "environment" }, // 強制使用後置鏡頭
                        config,
                        (decodedText) => {
                            // 掃描成功時的動作
                            playSuccessFeedback(); // 逼一聲+震動
                            document.getElementById('scanId').value = decodedText;
                            document.getElementById('productSelect').value = decodedText; // 同步下拉選單
                            
                            toggleScanner(); // 自動關閉相機
                        }
                    );
                    btn.innerText = "❌ 關閉相機";
                    isScanning = true;
                } catch (err) {
                    alert("無法啟動相機，請確認已給予瀏覽器相機權限。");
                    readerDiv.classList.add('hidden');
                }
            } else {
                if(html5QrCode) {
                    await html5QrCode.stop();
                    html5QrCode = null;
                }
                readerDiv.classList.add('hidden');
                btn.innerText = "📷 開啟相機掃碼";
                isScanning = false;
            }
        }

        // ==========================================
        // 4. 表單與購物車邏輯
        // ==========================================

        // 當手動下拉選單改變時，同步編號文字框
        function syncIdFromSelect() {
            const select = document.getElementById('productSelect');
            document.getElementById('scanId').value = select.value;
        }

        // 新增品項到本次清單
        function addCurrentItem() {
            const id = document.getElementById('scanId').value;
            const qty = parseInt(document.getElementById('scanQty').value);
            const select = document.getElementById('productSelect');
            
            if (!id || isNaN(qty) || qty <= 0) {
                return alert("請掃描或選擇商品，並輸入正確數量！");
            }

            // 取得品名 (去除括號內的編號)
            let name = "未知商品";
            if (select.selectedIndex > 0) {
                name = select.options[select.selectedIndex].text.split(' (')[0];
            }

            let existing = cart.find(i => i.id === id);
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({ id: id, name: name, quantity: qty });
            }

            // 重置錄入區
            document.getElementById('scanId').value = "";
            document.getElementById('productSelect').value = "";
            document.getElementById('scanQty').value = "1";
            renderList();
        }

        // 渲染待提交清單
        function renderList() {
            const list = document.getElementById('itemList');
            document.getElementById('totalItems').innerText = `${cart.length} 項`;
            if (cart.length === 0) {
                list.innerHTML = `<li class="p-3 text-gray-400 text-center text-sm">尚未加入任何項目</li>`;
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <li class="p-3 flex justify-between items-center text-sm">
                    <div>
                        <div class="font-bold text-gray-800">${item.name}</div>
                        <div class="text-gray-500 text-xs">${item.id}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-blue-600">x${item.quantity}</span>
                        <button onclick="cart.splice(${index}, 1); renderList();" class="text-red-400 p-1 font-bold text-lg active:text-red-600">✕</button>
                    </div>
                </li>
            `).join('');
        }

        // ==========================================
        // 5. 資料提交至 Google 試算表
        // ==========================================
        async function submitData() {
            const operator = document.getElementById('operator').value;
            const reason = document.getElementById('reason').value;
            
            if (!operator) return alert("請選擇操作人員！");
            if (cart.length === 0) return alert("請至少加入一個品項到清單！");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "資料傳送中...";

            const payload = {
                orderId: "ORD-" + Date.now(),
                operator: operator,
                type: document.getElementById('type').value,
                reason: reason,
                items: cart
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });
                alert("✅ 提交成功！");
                cart = []; // 清空購物車
                renderList();
            } catch (e) {
                alert("❌ 提交失敗，請檢查網路。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交至雲端";
            }
        }
    </script>
</body>
</html>
